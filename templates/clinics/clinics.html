<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Clinic</title>
  <link rel="manifest" href="../manifest.json" />
  <link rel="stylesheet" href="../../base/reset.css" />
  <link rel="stylesheet" href="../../base/tokens.css" />
  <link rel="icon" href="../../assets/icon.png" />
  <link rel="stylesheet" href="../../base/utilities.css" />
  <link rel="stylesheet" href="../../base/typography.css" />
  <link rel="stylesheet" href="../../components/header.css" />
  <link rel="stylesheet" href="../../components/footer.css" />
  <link rel="stylesheet" href="../../components/buttons.css" />
  <link rel="stylesheet" href="../../components/box.css" />
  <link rel="stylesheet" href="../../components/icons-badge.css" />
  <link rel="stylesheet" href="../../components/doctor-page.css" />
  <link rel="stylesheet" href="../../components/breadcrumbs.css" />
  <link rel="stylesheet" href="../../components/lists-section.css" />
  <link rel="stylesheet" href="../../components/doctors.css" />
  <link rel="stylesheet" href="../../components/calendar.css" />
  <link rel="stylesheet" href="../../components/filter.css" />


  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>

<body>
  <y-navbar></y-navbar>

  <main>
    <section class="doctor-page doctors-page">
      <div class="container y-u-max-w-1200">
        <div class="lists">
          <div class="bottom">
            <div class="list" data-y-filter="specialty">
              <input type="checkbox" name="list1" id="list1">
              <label for="list1"><span class="list-label-text">التخصص</span>
                <img src="../../assets/bottom-arrow.svg" alt="سهم القائمة"></label>
              <div class="items">
                <button type="button">أسنان</button>
                <button type="button">نفسي</button>
                <button type="button">باطنة</button>
                <button type="button">نساء و توليد</button>
                <button type="button">عيون</button>
                <button type="button">مخ وأعصاب</button>
                <button type="button">عظام</button>
                <button type="button">جلدية</button>
                <button type="button">صدر و جهاز تنفسي</button>
                <button type="button">أنف و أذن و حنجرة</button>

              </div>

            </div>
            <div class="list" data-y-filter="city">
              <input type="checkbox" name="list2" id="list2">
              <label for="list2"><span class="list-label-text">المدينة</span>
                <img src="../../assets/bottom-arrow.svg" alt="سهم القائمة"></label>
              <div class="items">
                <button type="button">الرياض</button>
                <button type="button">مكة المكرمة</button>
                <button type="button">المدينة المنورة</button>
                <button type="button">جدة</button>
                <button type="button">الدمام</button>
                <button type="button">الخبر</button>
                <button type="button">الجبيل</button>
                <button type="button">الأحساء</button>
                <button type="button">الخرج</button>
                <button type="button">القطيف</button>
                <button type="button">تبوك</button>
                <button type="button">الباحة</button>
                <button type="button">الجوف</button>
                <button type="button">الطائف</button>
              </div>

            </div>
            <div class="list">
              <input type="text" name="doctor" id="doctor" placeholder="اسم العيادة" autocomplete="off">
            </div>
            <button type="button" class="btn main-button fw invert fh y-filter-search">ابحث <img src="../../assets/search.svg" alt="أيقونة البحث"></button>

          </div>

        </div>
        <div class="breadcrumbs-container">
        <div class="breadcrumbs">
          <a href="../layout/index.html">الرئيسية</a>
          /
          <a href="../clinics/clinics.html">العيادات</a>
            /
            <p class="y-breadcrumb-filter">العيادات</p>
          </div>
          <div class="custom-dropdown sort-dropdown">
            <div class="dropdown-trigger">
              <span class="current-sort">تصنيف حسب</span>
              <i class="fa-solid fa-angle-down dropdown-arrow"></i>
            </div>
            <ul class="dropdown-options">
              <li data-value="option1">الأعلى تقييمًا</li>
              <li data-value="option2">السعر من الأعلى إلى الأقل</li>
              <li data-value="option3">السعر من الأقل إلى الأعلى</li>
              <li data-value="option4">الأحدث</li>
            </ul>
          </div>
        </div>
        <div class="bottom">
          <div class="content" id="about">
            <div class="right">
              <div class="box">
                <p>النوع</p>
                <div class="types" data-y-sidebar="gender">
                  <button type="button" class="active" data-y-value="all">الكل</button>
                  <button type="button" data-y-value="male">طبيب</button>
                  <button type="button" data-y-value="female">طبيبة</button>
                </div>
                <p>الموعد</p>
                <div class="types" data-y-sidebar="slot">
                  <button type="button" class="active" data-y-value="all">الكل</button>
                  <button type="button" data-y-value="today">اليوم</button>
                  <button type="button" data-y-value="tomorrow">غدا</button>
                </div>
                <p>سعر الكشف</p>
                <div class="range" style="--value: 500">
                  <input type="range" min="0" max="500" value="500" name="range" id="range"
                    oninput="this.parentElement.style.setProperty('--value', this.value); this.nextElementSibling.value = this.value">
                  <output>500</output>
                </div>


              </div>


            </div>
            <div class="left">
              <div class="doctors-box-clinic" id="y-clinics-list"></div>
              <button type="button" hidden class="btn main-button center">اعرض المزيد</button>
            </div>



          </div>


        </div>
      </div>
    </section>

  </main>


  <y-footer></y-footer>

  <script src="../../js/y-catalog.js"></script>
  <script src="../../js/y-render-lists.js"></script>
  <script src="../../js/y-app-init.js"></script>
  <script src="../../js/calendar.js"></script>
  <script src="../../js/dropdown.js"></script>
  <script src="../../js/y-catalog-filters.js"></script>
</body>

</html>
